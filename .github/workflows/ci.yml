name: "TİLK CI"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Kontrol (Format + Lint + Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Rust Toolchain Kur
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo Cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format Kontrolü
        run: cargo fmt --all --check

      - name: Clippy Lint Kontrolü
        run: cargo clippy --all-targets --all-features

      - name: Testler
        run: cargo test --all

      - name: Örnek Dosya Duman Testleri
        run: |
          for f in examples/*.oz; do
            echo "==> Çalıştırılıyor: $f"
            cargo run --bin oz-cli --release -- calistir "$f" || exit 1
          done

  build-release:
    name: Release Build Kontrolü
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7

      - name: Rust Toolchain Kur
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Release Build
        run: cargo build --release

  fuzz-smoke:
    name: Fuzz Duman Testi (60s)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7

      - name: Rust Nightly Kur
        uses: dtolnay/rust-toolchain@nightly

      - name: cargo-fuzz Kur
        run: cargo install cargo-fuzz

      - name: Lexer Fuzz (60s)
        run: cargo +nightly fuzz run fuzz_lexer -- -max_total_time=60
        working-directory: fuzz

      - name: Parser Fuzz (60s)
        run: cargo +nightly fuzz run fuzz_parser -- -max_total_time=60
        working-directory: fuzz
